<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub 热门项目排行榜</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --muted: #8b949e;
  --link: #58a6ff;
  --gold: #e3b341;
  --green: #3fb950;
  --orange: #f78166;
  --purple: #a371f7;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  line-height: 1.6; min-height: 100vh;
}
.container { max-width: 1000px; margin: 0 auto; padding: 20px; }

/* Header */
header {
  text-align: center; padding: 40px 0 20px;
  border-bottom: 1px solid var(--border); margin-bottom: 24px;
}
header h1 { font-size: 2rem; color: #f0f6fc; }
header h1 span { color: var(--gold); }
header p { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }
.time-row {
  display: flex; align-items: center; justify-content: center;
  gap: 12px; margin-top: 10px; flex-wrap: wrap;
}
.time-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 14px; border-radius: 16px;
  font-size: 0.82rem; font-weight: 500;
}
.time-badge.fresh { background: #1a2e1a; color: var(--green); border: 1px solid #23863644; }
.time-badge.cached { background: #2a1e0a; color: var(--gold); border: 1px solid #d2992244; }
.refresh-btn {
  padding: 5px 16px; border-radius: 16px;
  border: 1px solid var(--border); background: var(--card);
  color: var(--link); cursor: pointer; font-size: 0.82rem;
  transition: all 0.2s;
}
.refresh-btn:hover { background: #1c2a3a; border-color: var(--link); }
.intro-cn {
  color: var(--text); font-size: 0.9rem; line-height: 1.7;
  padding-bottom: 12px; margin-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.why-hot {
  background: #1a1608; border: 1px solid #3a3008;
  border-radius: 10px; padding: 14px 16px;
  font-size: 0.85rem; line-height: 1.7;
}
.why-hot .label {
  display: flex; align-items: center; gap: 6px;
  color: var(--gold); font-weight: 700; font-size: 0.9rem;
  margin-bottom: 8px;
}
.why-hot ul { margin: 0; padding-left: 0; list-style: none; }
.why-hot ul li {
  position: relative; padding-left: 22px; margin-bottom: 6px;
  color: #e6d9a8;
}
.why-hot ul li::before {
  content: '▸'; position: absolute; left: 4px; color: var(--gold);
  font-size: 0.7rem; top: 1px;
}

/* Hot Words */
.hot-words-section {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px 24px; margin-bottom: 24px;
}
.hot-words-section h2 { font-size: 1.05rem; color: #f0f6fc; margin-bottom: 14px; }
.hot-words-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
.hot-word {
  padding: 4px 12px; border-radius: 14px;
  font-weight: 500; transition: all 0.15s;
}
.hot-word:hover { transform: scale(1.05); }
.hot-word.large { font-size: 1.05rem; color: #f0f6fc; background: #1c2a3a; border: 1px solid #58a6ff55; }
.hot-word.medium { font-size: 0.88rem; color: #c9d1d9; background: #1a1e2a; border: 1px solid #30363d; }
.hot-word.small { font-size: 0.75rem; color: #8b949e; background: #161b22; border: 1px solid #21262d; }

/* Rank Change */
.rank-change { font-size: 0.7rem; font-weight: 600; white-space: nowrap; }
.rank-change.up { color: #3fb950; }
.rank-change.down { color: #f85149; }
.rank-change.new { color: var(--link); }

/* Collapse */
.collapse-btn {
  background: var(--card); border: 1px solid var(--border);
  color: var(--muted); padding: 3px 12px; border-radius: 6px;
  cursor: pointer; font-size: 0.8rem; transition: all 0.15s;
}
.collapse-btn:hover { color: var(--link); border-color: var(--link); }
.table-section.collapsed .table-wrap { display: none; }
.table-section.collapsed .no-results { display: none !important; }

/* Filters */
.filters {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  margin-bottom: 28px;
}
.filter-btn {
  padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--card); color: var(--text); cursor: pointer;
  font-size: 0.85rem; transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--link); color: var(--link); }
.filter-btn.active { background: var(--link); border-color: var(--link); color: #fff; }
.filter-btn .count { color: var(--muted); font-size: 0.75rem; margin-left: 4px; }

/* Loading */
.loading {
  text-align: center; padding: 60px 20px; color: var(--muted);
}
.loading .spinner {
  width: 40px; height: 40px; border: 3px solid var(--border);
  border-top-color: var(--link); border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-box {
  background: #2d1111; border: 1px solid #f8514966; border-radius: 8px;
  padding: 20px; text-align: center; color: #f85149; margin: 20px 0;
}

/* Top 3 Cards */
.top3 {
  display: flex; flex-direction: column;
  gap: 16px; margin-bottom: 32px;
}
.top-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; position: relative;
  transition: border-color 0.2s;
}
.top-card:hover { border-color: var(--link); }
.top-card .rank {
  position: absolute; top: 12px; right: 16px;
  font-weight: 800; color: var(--border);
}
.top-card.rank1 .rank {
  font-size: 3.5rem;
  background: linear-gradient(135deg, #e3b341, #f0c75e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 8px #e3b34144);
}
.top-card.rank2 .rank {
  font-size: 2.8rem;
  color: #a0aab4;
}
.top-card.rank3 .rank {
  font-size: 2.2rem;
  color: #d9785a;
}
.top-card.rank1 { border-color: var(--gold); }
.top-card.rank2 { border-color: var(--muted); }
.top-card.rank3 { border-color: var(--orange); }
.top-card .repo-name {
  font-size: 1.25rem; font-weight: 600; margin-bottom: 4px;
}
.top-card .repo-name a { color: var(--link); text-decoration: none; }
.top-card .repo-name a:hover { text-decoration: underline; }
.top-card .stats {
  display: flex; gap: 16px; align-items: center; margin: 8px 0;
  font-size: 0.9rem; color: var(--muted);
}
.top-card .stars { color: var(--gold); font-weight: 700; font-size: 1.1rem; }
.top-card .desc { color: var(--text); font-size: 0.9rem; margin: 8px 0; line-height: 1.5; }
.top-card .tags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.top-card .days-ago { font-size: 0.8rem; color: var(--muted); }

/* Tags */
.tag {
  display: inline-block; padding: 2px 10px; border-radius: 12px;
  font-size: 0.75rem; font-weight: 500;
}
.tag-lang { background: #1c2a3a; color: var(--link); }
.tag-cat { background: #1a2e1a; color: var(--green); }
.tag-hot { background: #3a2a0a; color: var(--gold); }

/* Chart section */
.chart-section {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; margin-bottom: 32px;
}
.chart-section h2 { font-size: 1.1rem; color: #f0f6fc; margin-bottom: 16px; }
.chart-wrap { position: relative; height: 300px; }

/* Table */
.table-section {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden; margin-bottom: 40px;
}
.table-section h2 { font-size: 1.1rem; color: #f0f6fc; padding: 20px 24px 0; }
.table-wrap { overflow-x: auto; padding: 12px 24px 24px; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
th { color: var(--muted); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }
tr:hover td { background: #1c2129; }
td a { color: var(--link); text-decoration: none; }
td a:hover { text-decoration: underline; }
td.num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
td.desc-cell { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lang-dot {
  display: inline-block; width: 10px; height: 10px; border-radius: 50%;
  margin-right: 4px; vertical-align: middle;
}
.no-results { text-align: center; padding: 40px; color: var(--muted); }
footer { text-align: center; padding: 20px; color: #484f58; font-size: 0.8rem; }

@media (max-width: 750px) {
  .top3 { grid-template-columns: 1fr; }
  header h1 { font-size: 1.5rem; }
}
</style>
</head>

<!-- Header -->
<header>
  <h1><span>&#x1f525;</span> GitHub 热门项目排行榜</h1>

<footer>GitHub Trending Explorer &middot; 数据来自 GitHub Search API &middot; 无需登录</footer>
</div>

<script>
// ── 语言色映射 ──
const LANG_COLORS = {
  'JavaScript': '#f1e05a', 'TypeScript': '#3178c6', 'Python': '#3572A5',
  'Go': '#00ADD8', 'Rust': '#dea584', 'Java': '#b07219', 'C': '#555555',
  'C++': '#f34b7d', 'C#': '#178600', 'Ruby': '#701516', 'Swift': '#F05138',
  'Kotlin': '#A97BFF', 'Zig': '#ec915c', 'Shell': '#89e051', 'HTML': '#e34c26',
  'CSS': '#563d7c', 'SCSS': '#c6538c', 'Vue': '#41b883', 'Svelte': '#ff3e00',
  'Dart': '#00B4AB', 'Lua': '#000080', 'PHP': '#4F5D95', 'Scala': '#c22d40',
  'Elixir': '#6e4a7e', 'Haskell': '#5e5086', 'Clojure': '#db5855',
  'Jupyter Notebook': '#DA5B0B', 'MDX': '#fcb32c', 'Dockerfile': '#384d54',
  'Makefile': '#427819', 'Nix': '#7e7eff', 'CMake': '#DA3434', 'R': '#198CE7',
};

// ── 分类规则 ──
const CATEGORIES = [
  { id: 'all', label: '全部', icon: '&#x1f30d;' },
  { id: 'ai', label: '&#x1f916; AI/LLM', match(r) {
    const kw = ['ai','llm','gpt','claude','agent','model','deepseek','openai','rag','copilot','chat','prompt','transformer','llama','mistral','gemini','diffusion','stable-diffusion','text-to'];
    const t = (r.description||'').toLowerCase() + ' ' + (r.full_name||'').toLowerCase();
    return kw.some(k => t.includes(k));
  }},
  { id: 'frontend', label: '&#x1f3a8; 前端', match(r) {
    const kw = ['ui','react','vue','component','css','tailwind','web','frontend','svelte','next.js','nuxt','astro','htmx'];
    const t = (r.description||'').toLowerCase() + ' ' + (r.language||'').toLowerCase();
    return kw.some(k => t.includes(k));
  }},
  { id: 'backend', label: '&#x2699;&#xfe0f; 后端', match(r) {
    const kw = ['api','server','database','postgres','sql','graphql','grpc','backend','microservice','orm','kubernetes','docker','redis','kafka','message queue'];
    const t = (r.description||'').toLowerCase();
    return kw.some(k => t.includes(k));
  }},
  { id: 'devtools', label: '&#x1f6e0;&#xfe0f; 工具', match(r) {
    const kw = ['cli','tool','sdk','framework','library','sdk','plugin','devtools','debug','compiler','editor','ide','terminal','shell','git','package','build','linter','formatter','bundler','vite','webpack'];
    const t = (r.description||'').toLowerCase() + ' ' + (r.full_name||'').toLowerCase();
    return kw.some(k => t.includes(k));
  }},
  { id: 'rust', label: '&#x1f980; Rust', match(r) {
    return (r.language === 'Rust');
  }},
  { id: 'mobile', label: '&#x1f4f1; 移动端', match(r) {
    const kw = ['ios','android','mobile','swift','kotlin','flutter','react-native','expo'];
    const t = (r.description||'').toLowerCase();
    return kw.some(k => t.includes(k));
  }},
];

// ── 中文简介数据 ──
let introsData = {};

function loadIntros() {
  try {
    const el = document.getElementById('intros-data');
    if (el && el.textContent.trim()) {
      introsData = JSON.parse(el.textContent);
      const updated = new Date(introsData.updated).getTime();
      if (Date.now() - updated > 7200000) introsData = {};
    }
  } catch(e) { introsData = {}; }
}

// ── 格式化 ──
function formatTime(ts) {
  return new Date(ts).toLocaleString('zh-CN');
}

function daysAgo(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diff = Math.floor((now - d) / 86400000);
  if (diff === 0) return '今天';
  if (diff === 1) return '昨天';
  if (diff < 30) return `${diff} 天前`;
  const m = Math.floor(diff / 30);
  return `${m} 个月前`;
}

function formatNum(n) {
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return String(n);
}

function langColor(lang) {
  return LANG_COLORS[lang] || '#8b949e';
}

// ── 获取分类 ──
function getCategories(repo) {
  return CATEGORIES.filter(c => c.match && c.match(repo)).map(c => c.id);
}

// ── 获取数据 ──
async function fetchTrending(force = false) {
  const cacheKey = 'gh_trending_v2';
  const cacheTimeKey = cacheKey + '_time';

  // 非强制刷新时检查缓存
  if (!force) {
    const cacheTime = localStorage.getItem(cacheTimeKey);
    if (cacheTime && (Date.now() - Number(cacheTime)) < 3600000) {
      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        return { repos: JSON.parse(cached), fromCache: true, fetchTime: Number(cacheTime) };
      }
    }
  }

  const date = new Date();
  date.setDate(date.getDate() - 30);
  const since = date.toISOString().split('T')[0];
  const query = `created:>${since}`;
  const url = `https://api.github.com/search/repositories?q=${encodeURIComponent(query)}&sort=stars&order=desc&per_page=20`;

  const resp = await fetch(url, {
    headers: { 'Accept': 'application/vnd.github.v3+json' },
    signal: AbortSignal.timeout(15000)
  });
  if (!resp.ok) {
    if (resp.status === 403) throw new Error('API 限流（60次/小时），请稍后再试');
    throw new Error(`GitHub API 返回错误 (${resp.status})`);
  }
  const data = await resp.json();

  const enriched = (data.items || []).map((repo, i) => ({
    ...repo,
    rank: i + 1,
    categories: getCategories(repo),
  }));

  const fetchTime = Date.now();
  try {
    localStorage.setItem(cacheKey, JSON.stringify(enriched));
    localStorage.setItem(cacheTimeKey, String(fetchTime));
  } catch(e) { /* quota exceeded */ }

  return { repos: enriched, fromCache: false, fetchTime };
}

// ── 渲染 ──
let allRepos = [];
let activeFilter = 'all';
let dataFromCache = false;
let dataFetchTime = Date.now();

function renderAll() {
  const filtered = activeFilter === 'all'
    ? allRepos
    : allRepos.filter(r => r.categories.includes(activeFilter));

  renderFilters();
  renderTop3(filtered.slice(0, 3));
  renderChart(filtered.slice(0, 10));
  renderHotWords(extractHotWords(allRepos.slice(0, 20)));
  renderTable(filtered);
  document.getElementById('listCount').textContent = filtered.length;
  document.getElementById('noResults').style.display = filtered.length ? 'none' : 'block';

  // 恢复折叠状态
  const collapsed = localStorage.getItem('gh_table_collapsed') === '1';
  const section = document.getElementById('tableSection');
  const btn = document.getElementById('collapseBtn');
  if (collapsed) { section.classList.add('collapsed'); btn.textContent = '展开'; }

  // 更新时间显示
  const badge = document.getElementById('timeBadge');
  const btn = document.getElementById('refreshBtn');
  if (dataFromCache) {
    badge.className = 'time-badge cached';
    badge.innerHTML = `&#x1f4be; 缓存于 ${formatTime(dataFetchTime)}`;
    btn.disabled = false;
  } else {
    badge.className = 'time-badge fresh';
    badge.innerHTML = `&#x1f504; 数据获取于 ${formatTime(dataFetchTime)}`;
    btn.disabled = false;
  }
}

async function forceRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '刷新中...';
  try {
    const result = await fetchTrending(true);
    allRepos = result.repos;
    dataFromCache = false;
    dataFetchTime = result.fetchTime;
    renderAll();
  } catch(e) {
    alert('刷新失败：' + e.message);
  }
  btn.textContent = '↻ 立即刷新';
  btn.disabled = false;
}

function renderFilters() {
  const el = document.getElementById('filters');
  const counts = {};
  CATEGORIES.forEach(c => {
    counts[c.id] = c.id === 'all'
      ? allRepos.length
      : allRepos.filter(r => r.categories.includes(c.id)).length;
  });
  el.innerHTML = CATEGORIES.map(c => {
    const active = c.id === activeFilter ? ' active' : '';
    return `<button class="filter-btn${active}" data-cat="${c.id}" onclick="setFilter('${c.id}')">
      ${c.label}<span class="count">${counts[c.id]}</span></button>`;
  }).join('');
}

// ── 格式化"为什么火"为列表 ──
function formatWhyHot(text) {
  // 去掉可能重复的"爆火原因："前缀
  let t = text.replace(/^爆火原因[：:]\s*/g, '');
  // 拆分 1) 2) 3) 或 1. 2. 3. 格式
  const parts = t.split(/(?:\d)[\)\.]\s*/).filter(Boolean);
  if (parts.length <= 1) return `<p>${t}</p>`;
  return `<ul>${parts.map(p => `<li>${p.trim()}</li>`).join('')}</ul>`;
}

// ── 排名变化 ──
function computeRankChanges(repos) {
  const prev = JSON.parse(localStorage.getItem('gh_prev_rankings') || '{}');
  const now = {};
  repos.forEach(r => { now[r.full_name] = r.rank; });
  // 保存当前排名
  localStorage.setItem('gh_prev_rankings', JSON.stringify(now));
  // 计算变化
  return repos.map(r => {
    const old = prev[r.full_name];
    if (old === undefined) return { full_name: r.full_name, change: 'NEW', cls: 'new' };
    const diff = old - r.rank;
    if (diff > 0) return { full_name: r.full_name, change: `↑${diff}`, cls: 'up' };
    if (diff < 0) return { full_name: r.full_name, change: `↓${Math.abs(diff)}`, cls: 'down' };
    return { full_name: r.full_name, change: '-', cls: '' };
  });
}

// ── 热词提取 ──
const HOT_WORDS_DICT = {
  'ai': 'AI', 'llm': 'LLM', 'gpt': 'GPT', 'claude': 'Claude', 'agent': 'Agent',
  'openai': 'OpenAI', 'deepseek': 'DeepSeek', 'copilot': 'Copilot', 'cursor': 'Cursor',
  'model': '模型', 'api': 'API', 'open-source': '开源', 'local-first': '本地优先',
  'design': '设计', 'prototype': '原型', 'react': 'React', 'vue': 'Vue',
  'typescript': 'TypeScript', 'javascript': 'JavaScript', 'rust': 'Rust',
  'python': 'Python', 'cli': 'CLI', 'tool': '工具', 'sdk': 'SDK',
  'plugin': '插件', 'web': 'Web', 'mobile': '移动端', 'desktop': '桌面端',
  'docker': 'Docker', 'kubernetes': 'K8s', 'server': '服务端',
  'database': '数据库', 'framework': '框架', 'library': '类库',
  'template': '模板', 'generator': '生成器', 'code': '代码',
  'image': '图像', 'video': '视频', 'text-to': '文本生成',
  'rag': 'RAG', 'workflow': '工作流', 'automation': '自动化',
  'html': 'HTML', 'css': 'CSS', 'slides': '幻灯片', 'animation': '动画',
  'export': '导出', 'preview': '预览', 'sandbox': '沙盒', 'native': '原生',
};

function extractHotWords(repos) {
  const counts = {};
  repos.forEach(r => {
    const text = ((r.description || '') + ' ' + (r.full_name || '') + ' ' + (r.language || '')).toLowerCase();
    Object.entries(HOT_WORDS_DICT).forEach(([key, label]) => {
      if (text.includes(key)) counts[label] = (counts[label] || 0) + 1;
    });
  });
  return Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 18)
    .map(([word, count]) => ({ word, count }));
}

function renderHotWords(words) {
  const max = words.length ? words[0].count : 1;
  const el = document.getElementById('hotWords');
  el.innerHTML = words.map(w => {
    let tier;
    if (w.count >= max * 0.7) tier = 'large';
    else if (w.count >= max * 0.4) tier = 'medium';
    else tier = 'small';
    return `<span class="hot-word ${tier}">${w.word}<span style="font-size:0.65rem;margin-left:3px;opacity:0.5">${w.count}</span></span>`;
  }).join('');
}

// ── 表格折叠 ──
function toggleTable() {
  const section = document.getElementById('tableSection');
  const btn = document.getElementById('collapseBtn');
  const collapsed = section.classList.toggle('collapsed');
  btn.textContent = collapsed ? '展开' : '收起';
  localStorage.setItem('gh_table_collapsed', collapsed ? '1' : '0');
}

function renderTop3(items) {
  const el = document.getElementById('top3');
  el.innerHTML = items.map((r, i) => {
    const rankClass = i === 0 ? 'rank1' : i === 1 ? 'rank2' : 'rank3';
    const info = (introsData.repos || {})[r.full_name];
    return `<div class="top-card ${rankClass}">
      <div class="rank">#${r.rank}</div>
      <div class="repo-name">
        <a href="${r.html_url}" target="_blank">${r.full_name}</a>
      </div>
      <div class="stats">
        <span class="stars">&#x2b50; ${r.stargazers_count.toLocaleString()}</span>
        <span>&#x1f374; ${formatNum(r.forks_count)}</span>
        <span>&#x1f4c5; ${daysAgo(r.created_at)}</span>
      </div>
      ${info
        ? `<div class="intro-cn">&#x1f4d6; ${info.intro}</div>
           <div class="why-hot">
             <div class="label">&#x1f525; 为什么这么火</div>
             ${formatWhyHot(info.why_hot)}
           </div>`
        : `<div class="desc">${r.description || '（暂无介绍）'}</div>`
      }
      <div class="tags-row">
        ${r.language ? `<span class="tag tag-lang">
          <span class="lang-dot" style="background:${langColor(r.language)}"></span>${r.language}
        </span>` : ''}
        ${r.categories.slice(0, 2).map(cid => {
          const c = CATEGORIES.find(x => x.id === cid);
          return c ? `<span class="tag tag-cat">${c.label}</span>` : '';
        }).join('')}
        ${r.stargazers_count > 50000 ? '<span class="tag tag-hot">&#x1f525; 爆火</span>' : ''}
        ${info ? '<span class="tag tag-hot">&#x1f4dd; AI 解读</span>' : ''}
      </div>
    </div>`;
  }).join('');
}

function renderChart(items) {
  const canvas = document.getElementById('starChart');
  const names = items.map(r => r.full_name.split('/')[1]);
  const stars = items.map(r => r.stargazers_count);
  const colors = ['#e3b341','#58a6ff','#3fb950','#f78166','#a371f7',
                   '#8b949e','#79c0ff','#56d364','#e3b34199','#f0883e'];

  // 销毁旧图
  const existing = Chart.getChart(canvas);
  if (existing) existing.destroy();

  new Chart(canvas, {
    type: 'bar',
    data: {
      labels: names,
      datasets: [{
        label: 'Stars',
        data: stars,
        backgroundColor: colors.slice(0, items.length),
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.parsed.x.toLocaleString()} stars`
          }
        }
      },
      scales: {
        x: {
          beginAtZero: true,
          ticks: { color: '#8b949e', callback: v => formatNum(v) },
          grid: { color: '#21262d' }
        },
        y: {
          ticks: { color: '#8b949e', font: { size: 12 } },
          grid: { display: false }
        }
      }
    }
  });
}

function renderTable(items) {
  const changes = computeRankChanges(items);
  const changeMap = {};
  changes.forEach(c => { changeMap[c.full_name] = c; });

  const el = document.getElementById('tableBody');
  el.innerHTML = items.map(r => {
    const catNames = r.categories.map(cid => {
      const c = CATEGORIES.find(x => x.id === cid);
      return c ? c.label : '';
    }).filter(Boolean).join(' ');
    const ch = changeMap[r.full_name] || { change: '-', cls: '' };
    const chHtml = ch.change === 'NEW'
      ? `<span class="rank-change new">NEW</span>`
      : ch.change === '-'
        ? `<span class="rank-change" style="color:var(--muted)">-</span>`
        : `<span class="rank-change ${ch.cls}">${ch.change}</span>`;
    return `<tr>
      <td style="color:var(--muted)">#${r.rank}</td>
      <td>${chHtml}</td>
      <td>
        <a href="${r.html_url}" target="_blank">${r.full_name}</a>
        <div style="font-size:0.8rem;color:var(--muted);margin-top:2px">${r.description || '暂无简介'}</div>
      </td>
      <td style="font-size:0.8rem">${catNames || '<span style="color:var(--muted)">通用</span>'}</td>
      <td class="num" style="color:var(--gold)">${r.stargazers_count.toLocaleString()}</td>
      <td class="num">${formatNum(r.forks_count)}</td>
      <td style="white-space:nowrap;color:var(--muted)">${daysAgo(r.created_at)}</td>
    </tr>`;
  }).join('');
}

function setFilter(id) {
  activeFilter = id;
  renderAll();
}

// ── 入口 ──
async function main() {
  try {
    // 并行加载数据
    const result = await fetchTrending();
    allRepos = result.repos;
    dataFromCache = result.fromCache;
    dataFetchTime = result.fetchTime;
    loadIntros();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    renderAll();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('errorBox').style.display = 'block';
    document.getElementById('errorMsg').textContent = '加载失败：' + e.message;
    // 如果有缓存就用缓存的
    const cached = localStorage.getItem('gh_trending_v2');
    if (cached) {
      allRepos = JSON.parse(cached);
      dataFromCache = true;
      dataFetchTime = Number(localStorage.getItem('gh_trending_v2_time'));
      loadIntros();
      document.getElementById('errorBox').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      renderAll();
    }
  }
}

main();
</script>
